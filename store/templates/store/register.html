{% extends 'store/base.html' %}

{% block title %}Register - GreenPower Solutions{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 60px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2e7d32; margin-bottom: 25px;">Create New Account</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" 
                style="width:100%; padding:14px; background:#2e7d32; color:white; border:none; border-radius:8px; font-size:1.1rem; margin-top:15px; cursor:pointer;">
            Register
        </button>
    </form>

    <p style="text-align:center; margin-top:20px;">
        Already have an account? 
        <a href="{% url 'login' %}" style="color:#2e7d32; font-weight:bold;">Login Here</a>
    </p>
</div>
{% endblock %}
